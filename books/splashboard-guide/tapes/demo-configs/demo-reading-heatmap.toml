[[widget]]
id = "reading"
fetcher = "basic_heatmap"
render = "grid_heatmap"
[widget.options]
col_labels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
cells = [
  [0, 1, 0, 2, 3, 0, 0],
  [1, 1, 2, 0, 0, 4, 2],
  [0, 0, 1, 3, 2, 0, 1],
  [2, 1, 0, 0, 2, 3, 1],
]

[[row]]
height = { length = 6 }
  [[row.child]]
  widget = "reading"
