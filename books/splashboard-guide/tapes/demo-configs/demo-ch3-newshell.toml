# ch3 — a compact home splash, shown in shell context to confirm setup.
[[widget]]
id = "clock"
fetcher = "clock"
format = "%H:%M"
render = { type = "text_ascii", style = "blocks", pixel_size = "quadrant", align = "center", color = "panel_title" }

[[widget]]
id = "cal"
fetcher = "basic_calendar"
render = "grid_calendar"

[[widget]]
id = "year"
fetcher = "clock_ratio"
render = { type = "gauge_line", label_position = "center" }
[widget.options]
period = "year"

[[row]]
height = { length = 8 }
gap = 4
  [[row.child]]
  widget = "clock"
  width = { fill = 1 }
  border = "top"
  title = "now"
  [[row.child]]
  widget = "cal"
  width = { fill = 1 }
  border = "top"
  title = "this month"

[[row]]
height = { length = 2 }
  [[row.child]]
  widget = "year"
  border = "top"
  title = "year progress"
